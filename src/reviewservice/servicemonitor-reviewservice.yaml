apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: reviewservice-monitor
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: reviewservice
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
