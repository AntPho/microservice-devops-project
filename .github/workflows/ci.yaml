name: CI

on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔐 Login GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🏷️ Variables
      - name: Set variables
        id: vars
        run: |
          echo "TAG=sha-${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "REPO=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      # 🧪 Tests Go (frontend)
      - name: Run tests - frontend
        run: |
          cd src/frontend
          go test ./...

      # 🧪 Tests Go (checkoutservice)
      - name: Run tests - checkoutservice
        run: |
          cd src/checkoutservice
          go test ./... || true

      # 🐳 Build & Push Docker images
      - name: Build and push images
        run: |
          TAG=${{ steps.vars.outputs.TAG }}
          REPO=${{ steps.vars.outputs.REPO }}

          services=(
            adservice
            cartservice
            checkoutservice
            currencyservice
            emailservice
            frontend
            loadgenerator
            paymentservice
            productcatalogservice
            recommendationservice
            shippingservice
          )

          go_services=" " 

          find_dockerfile_path() {
            local service_dir=$1
            if [ -f "$service_dir/Dockerfile" ]; then
              echo "$service_dir"
            elif [ -f "$service_dir/src/Dockerfile" ]; then
              echo "$service_dir/src"
            else
              echo ""
            fi
          }

          for service in "${services[@]}"; do
            service_path="src/$service"
            if [ ! -d "$service_path" ]; then
              echo "⚠️ $service_path not found, skipping"
              continue
            fi

            dockerfile_path=$(find_dockerfile_path "$service_path")
            if [ -n "$dockerfile_path" ]; then
              echo "🚀 Building $service"
              if echo "$go_services" | grep -q "$service"; then
                echo "   Forcing --no-cache for $service"
                docker build --no-cache -t $REPO/$service:$TAG -t $REPO/$service:latest "$dockerfile_path"
              else
                docker build -t $REPO/$service:$TAG -t $REPO/$service:latest "$dockerfile_path"
              fi

              echo "📤 Pushing $service"
              docker push $REPO/$service:$TAG
              docker push $REPO/$service:latest
            else
              echo "❌ No Dockerfile for $service"
            fi
          done

      # 🔒 Scan de sécurité avec Trivy
      - name: Scan images with Trivy
        run: |
          set -e   # exit on error (we'll handle critical steps)
          
          TAG=${{ steps.vars.outputs.TAG }}
          REPO=${{ steps.vars.outputs.REPO }}

          echo "Tag is $TAG"
          eccho "Repo is $REPO"

          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

          services=(
            frontend
            checkoutservice
            productcatalogservice
          )
          echo "3"
          trivy_failed=0

          set -x   # enable command tracing for debugging

          for service in "${services[@]}"; do
            echo "🔍 Scanning $service..."
            echo "⬇️ Pulling image..."
            docker pull "$REPO/$service:$TAG" || {
              echo "Pull failed with exit $?"
              trivy_failed=1
            }
            trivy image --severity HIGH,CRITICAL "$REPO/$service:$TAG" || {
              echo "Trivy failed with exit $?"
              trivy_failed=1
            }
          done

          echo "Final trivy_failed=$trivy_failed"
          exit "$trivy_failed"
