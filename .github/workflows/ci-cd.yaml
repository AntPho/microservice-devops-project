name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          TAG="sha-${{ github.sha }}"
          REPO="ghcr.io/${{ github.repository }}"
          REPO_LOWER=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          
          echo "Repository: $REPO_LOWER"
          
          # Fonction pour trouver le chemin du Dockerfile
          find_dockerfile_path() {
            local service_dir=$1
            if [ -f "$service_dir/Dockerfile" ]; then
              echo "$service_dir"
            elif [ -f "$service_dir/src/Dockerfile" ]; then
              echo "$service_dir/src"
            else
              echo ""
            fi
          }
          
          # Liste des services à builder (basée sur les manifests)
          services=(
            "adservice"
            "cartservice"
            "checkoutservice"
            "currencyservice"
            "emailservice"
            "frontend"
            "loadgenerator"
            "paymentservice"
            "productcatalogservice"
            "recommendationservice"
            "shippingservice"
          )
          
          for service in "${services[@]}"; do
            service_path="src/$service"
            if [ ! -d "$service_path" ]; then
              echo "⚠️  Dossier $service_path n'existe pas, ignoré"
              continue
            fi
            
            dockerfile_path=$(find_dockerfile_path "$service_path")
            
            if [ -n "$dockerfile_path" ]; then
              echo "✅ Building $service from $dockerfile_path..."
              docker build -t $REPO_LOWER/$service:$TAG -t $REPO_LOWER/$service:latest "$dockerfile_path"
              
              echo "⏫ Pushing $service..."
              docker push $REPO_LOWER/$service:$TAG
              docker push $REPO_LOWER/$service:latest
            else
              echo "❌ Pas de Dockerfile trouvé pour $service"
              echo "   Contenu de $service_path:"
              ls -la "$service_path"
            fi
          done

      - name: Deploy to Kubernetes
        run: |
          TAG="sha-${{ github.sha }}"
          REPO="ghcr.io/${{ github.repository }}"
          REPO_LOWER=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          
          echo "🔄 Mise à jour des déploiements avec l'image $REPO_LOWER:*:$TAG"
          
          # Liste des déploiements à mettre à jour
          deployments=(
            "adservice"
            "cartservice"
            "checkoutservice"
            "currencyservice"
            "emailservice"
            "frontend"
            "loadgenerator"
            "paymentservice"
            "productcatalogservice"
            "recommendationservice"
            "shippingservice"
          )
          
          for deployment in "${deployments[@]}"; do
            # Déterminer le nom du conteneur (généralement "server" sauf pour loadgenerator)
            if [ "$deployment" = "loadgenerator" ]; then
              container="main"
            else
              container="server"
            fi
            
            echo "🔄 Mise à jour de $deployment (conteneur: $container)..."
            if kubectl set image deployment/$deployment $container=$REPO_LOWER/$deployment:$TAG; then
              echo "   ✅ $deployment mis à jour"
            else
              echo "   ⚠️  Échec de la mise à jour de $deployment (peut-être n'existe pas?)"
            fi
          done
          
          echo "⏳ Attente du redéploiement..."
          for deployment in "${deployments[@]}"; do
            echo "   Vérification de $deployment..."
            kubectl rollout status deployment/$deployment --timeout=60s || true
          done
          
          echo "✅ Déploiement terminé"
          kubectl get pods
