name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# Permissions pour le GITHUB_TOKEN
permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: self-hosted   # important : utilise le runner auto-hébergé

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          TAG="sha-${{ github.sha }}"
          REPO="ghcr.io/${{ github.repository }}"
          REPO_LOWER=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          
          echo "Repository: $REPO_LOWER"
          
          # Fonction pour trouver le Dockerfile d'un service
          find_dockerfile() {
            local service_dir=$1
            if [ -f "$service_dir/Dockerfile" ]; then
              echo "$service_dir"
            elif [ -f "$service_dir/src/Dockerfile" ]; then
              echo "$service_dir/src"
            else
              echo ""
            fi
          }
          
          # Parcourir tous les services
          for service in src/*; do
            if [ -d "$service" ]; then
              servicename=$(basename "$service")
              servicename_lower=$(echo "$servicename" | tr '[:upper:]' '[:lower:]')
              
              # Chercher le Dockerfile
              dockerfile_path=$(find_dockerfile "$service")
              
              if [ -n "$dockerfile_path" ]; then
                echo "✅ Building $servicename from $dockerfile_path..."
                docker build -t $REPO_LOWER/$servicename_lower:$TAG -t $REPO_LOWER/$servicename_lower:latest "$dockerfile_path"
                docker push $REPO_LOWER/$servicename_lower:$TAG
                docker push $REPO_LOWER/$servicename_lower:latest
              else
                echo "❌ Pas de Dockerfile trouvé pour $servicename"
                # Afficher la structure pour debug
                echo "Structure de $service:"
                ls -la "$service"
              fi
            fi
          done

      - name: Deploy to Kubernetes
        run: |
          TAG="sha-${{ github.sha }}"
          REPO="ghcr.io/${{ github.repository }}"
          REPO_LOWER=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          
          # Mettre à jour chaque déploiement avec la nouvelle image
          kubectl set image deployment/frontend server=$REPO_LOWER/frontend:$TAG
          kubectl set image deployment/cartservice server=$REPO_LOWER/cartservice:$TAG
          kubectl set image deployment/productcatalogservice server=$REPO_LOWER/productcatalogservice:$TAG
          kubectl set image deployment/currencyservice server=$REPO_LOWER/currencyservice:$TAG
          kubectl set image deployment/paymentservice server=$REPO_LOWER/paymentservice:$TAG
          kubectl set image deployment/shippingservice server=$REPO_LOWER/shippingservice:$TAG
          kubectl set image deployment/emailservice server=$REPO_LOWER/emailservice:$TAG
          kubectl set image deployment/checkoutservice server=$REPO_LOWER/checkoutservice:$TAG
          kubectl set image deployment/recommendationservice server=$REPO_LOWER/recommendationservice:$TAG
          kubectl set image deployment/adservice server=$REPO_LOWER/adservice:$TAG
          kubectl set image deployment/loadgenerator main=$REPO_LOWER/loadgenerator:$TAG
          echo "Déploiements mis à jour avec $REPO_LOWER"
