name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted   # ou ubuntu-latest selon ton choix

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup kubeconfig
        run: |
          export KUBECONFIG=/home/ubuntu/.kube/config

      - name: Check cluster
        run: kubectl get pods

      - name: Deploy images
        run: |
          TAG="sha-${{ github.event.workflow_run.head_sha }}"
          REPO="ghcr.io/${{ github.repository }}"
          REPO_LOWER=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')

          deployments=(
            "adservice"
            "cartservice"
            "checkoutservice"
            "currencyservice"
            "emailservice"
            "frontend"
            "loadgenerator"
            "paymentservice"
            "productcatalogservice"
            "recommendationservice"
            "shippingservice"
          )

          for deployment in "${deployments[@]}"; do
            if [ "$deployment" = "loadgenerator" ]; then
              container="main"
            else
              container="server"
            fi

            kubectl set image deployment/$deployment \
              $container=$REPO_LOWER/$deployment:$TAG
          done

      - name: Wait for rollout
        run: |
          for deployment in adservice cartservice checkoutservice currencyservice emailservice frontend loadgenerator paymentservice productcatalogservice recommendationservice shippingservice; do
            kubectl rollout status deployment/$deployment --timeout=60s || true
          done

      - name: Smoke test
        run: |
          FRONTEND_IP=$(kubectl get svc frontend-external \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

          echo "Frontend IP: $FRONTEND_IP"
          curl -f http://$FRONTEND_IP || exit 1
