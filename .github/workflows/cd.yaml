name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted   # ou ubuntu-latest selon ton choix

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup kubeconfig
        run: |
          export KUBECONFIG=/home/ubuntu/.kube/config

      - name: Check cluster
        run: kubectl get pods

      - name: Deploy images
        run: |
          TAG="sha-${{ github.event.workflow_run.head_sha }}"
          REPO="ghcr.io/${{ github.repository }}"
          REPO_LOWER=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')

          deployments=(
            "adservice"
            "cartservice"
            "checkoutservice"
            "currencyservice"
            "emailservice"
            "frontend"
            "loadgenerator"
            "paymentservice"
            "productcatalogservice"
            "recommendationservice"
            "shippingservice"
            "reviewservice"
          )

          for deployment in "${deployments[@]}"; do
            if [ "$deployment" = "loadgenerator" ]; then
              container="main"
            else
              container="server"
            fi

            kubectl set image deployment/$deployment \
              $container=$REPO_LOWER/$deployment:$TAG
          done

      - name: Wait for rollout
        run: |
          for deployment in adservice cartservice checkoutservice currencyservice emailservice frontend loadgenerator paymentservice productcatalogservice recommendationservice shippingservice; do
            kubectl rollout status deployment/$deployment --timeout=60s || true
          done

      - name: Health check after deployment
        run: |
          echo "🌐 Vérification de la santé des services..."
          
          # Attendre que les pods soient prêts
          kubectl wait --for=condition=ready pod -l app=frontend --timeout=120s
          
          # Tester l'API frontend
          NODE_IP=$(curl -s ifconfig.me)
          NODE_PORT=$(kubectl get svc frontend-external -o jsonpath='{.spec.ports[0].nodePort}')
          
          echo "Frontend URL: http://$NODE_IP:$NODE_PORT"
          
          # Vérifier que l'application répond
          curl -f -s -o /dev/null "http://$NODE_IP:$NODE_PORT" || exit 1
          
          echo "✅ Health check passed"

      - name: Smoke test - Check critical services
        run: |
          echo "🔍 Smoke test sur les services critiques..."
          
          # Vérifier que le frontend a un message
          NODE_IP=$(curl -s ifconfig.me)
          NODE_PORT=$(kubectl get svc frontend-external -o jsonpath='{.spec.ports[0].nodePort}')
          
          PAGE=$(curl -s "http://$NODE_IP:$NODE_PORT")
          if echo "$PAGE" | grep -q "Online Boutique"; then
            echo "✅ Frontend OK"
          else
            echo "❌ Frontend ne répond pas correctement"
            exit 1
          fi

      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠️ Déploiement échoué, rollback en cours..."
          
          for deployment in frontend checkoutservice cartservice; do
            echo "Rollback $deployment..."
            kubectl rollout undo deployment/$deployment
          done
          
          echo "✅ Rollback effectué"

      - name: Deployment status
        if: success()
        run: |
          echo "✅ Déploiement réussi !"
          echo "📊 Stats:"
          kubectl get pods
